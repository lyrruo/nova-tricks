<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova's Trick School 🐾</title>
  <!-- React + ReactDOM from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel so we can write JSX inline -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#fdf6ec;}
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const tricks = [
      { id:1,  name:"Paw",               emoji:"🤝", difficulty:"Easy",   time:"1 hour",  prerequisite:"Sit",        description:"Nova learns to place her paw in your outstretched hand — like a handshake, but better.",
        videos:[{id:"42OOTnTETNw",title:"Kikopup – Teach your dog to SHAKE"},{id:"uo7Zsaw_K5w",title:"McCann Dogs – Shake-A-Paw"}],
        steps:["At Nova's level, hold a treat in a closed hand facing upwards.","She'll investigate, sniff, and eventually paw at the hand. Say 'good' and give her a food reward.","Repeat several times, then present your hand without a treat. Reward when she places her paw on it.","Now say 'Paw' and hold your hand out flat. When she paws at it, say 'good' and reward again.","You can now incorporate holding her paw gently and shaking it."]},
      { id:2,  name:"Hand Touch",        emoji:"👃", difficulty:"Easy",   time:"1 hour",  prerequisite:"None",       description:"Nova moves towards your palm and bops it with her nose!",
        videos:[{id:"zC1VkZG9g3M",title:"Puppy Training – Nose to Hand Touch"}],
        steps:["Start with both hands behind your back and Nova in front of you.","Move your open palm in front of her — she'll likely sniff it. Say 'good' and reward.","Put your hand back and repeat until she's confidently making nose contact.","Now say 'touch' before presenting your hand and reward the same way.","Increase how far away she has to travel to bop your hand.","Gradually increase the distance until she can be across the room and run to touch your hand."]},
      { id:3,  name:"Spin",              emoji:"🌀", difficulty:"Medium", time:"2 hours", prerequisite:"None",       description:"Nova walks in a tight circle on the cue 'spin'.",
        videos:[{id:"THj8nVFnJ2U",title:"Battersea – Teach your dog to spin"},{id:"hJza51DsXIM",title:"Dog Tricks – Spin On Command"}],
        steps:["Have Nova in a heel position next to your leg, facing the same direction.","Hold a treat at her nose and move your hand in a circle out and away from you (like breaststroke).","Reward at half a circle first, then build to a full circle.","Once fluid, say 'spin' and move your hand the same way, rewarding as before.","Repeat as she becomes more confident.","Reduce gesturing each time until you simply say 'spin' and Nova moves."]},
      { id:4,  name:"Middle",            emoji:"🦵", difficulty:"Easy",   time:"2 hours", prerequisite:"None",       description:"Nova comes to stand between your legs and looks up at you.",
        videos:[{id:"KpPErj6xVZ0",title:"Puppy Trick Training – Middle / Peek-A-Boo"},{id:"_6O1EZB41B8",title:"Teach the MIDDLE command in 5 steps"}],
        steps:["Have Nova in front of you. Hold a treat at her nose.","Move your hand slowly round behind you so it ends up between your legs from behind.","Have your other hand ready to pass the treat through your legs to encourage her through.","Once her head and shoulders are poking through, stop and reward.","Repeat until it's nice and fluid.","Say 'middle' and move your hands as before. Over time reduce gesturing until she does it on just the verbal cue."]},
      { id:5,  name:"Figure of 8",       emoji:"8️⃣", difficulty:"Medium", time:"3 hours", prerequisite:"None",       description:"Nova makes a figure of 8 pattern weaving through your legs.",
        videos:[{id:"kSIg5g0Ohqo",title:"Dogs Trust – The Figure Eight"},{id:"qPMTDaYAiKg",title:"Teach your dog to WEAVE through legs / Figure 8"}],
        steps:["Hold treats in both closed hands.","Guide one hand near her nose, moving it backwards and between your legs.","Let Nova follow the treat through.","Meet with your other hand and guide her round the other side and back through — then reward.","Once easy, say 'figure' or 'weave' before moving your hands at all to add the verbal cue.","Gradually fade out how much gesturing each part requires."]},
      { id:6,  name:"Paws Up",           emoji:"🪨", difficulty:"Easy",   time:"2 hours", prerequisite:"None",       description:"Nova puts her front paws on a raised object — great for photos!",
        videos:[{id:"lbvBOA-KIRE",title:"Journey Dog Training – Paws Up Trick"},{id:"MTqebkIPziU",title:"Training Challenge Day 5 – Paws Up"}],
        steps:["With your chosen object nearby, hold a treat and move your hand so Nova follows towards it.","At the point her feet meet the edge, raise your hand slightly to encourage her to step up.","As soon as her feet are up, say 'good' and reward.","Repeat until fluid, then say 'paws up' and gesture the same way.","Build up how long she stays up before you say 'good' and reward."]},
      { id:7,  name:"Bow",               emoji:"🎭", difficulty:"Medium", time:"4 hours", prerequisite:"None",       description:"Nova bows — front half down, bottom in the air.",
        videos:[{id:"pT7-CHam2HU",title:"How to teach BOW – Dog Tricks tutorial"},{id:"XkvkrkHe1Sk",title:"Battersea – Teach your dog to take a bow"}],
        steps:["Hold a treat at her nose, gradually lower it towards her chest so her front legs start to lower.","Reward before she goes into a full down — you want front low but bottom still up.","Repeat, gradually getting her front legs lower until she's in the play bow position.","Reward each time she hits this position.","Say 'bow' or 'bend' and gesture the same way.","If she has a strong 'down', place your arm gently under her hips to keep her bottom up."]},
      { id:8,  name:"Shake Head",        emoji:"🤦", difficulty:"Easy",   time:"2 hours", prerequisite:"Sit",        description:"Nova nods or shakes her head on cue.",
        videos:[{id:"eDtmi48oN2I",title:"Teach Your Dog To Wave / Head Shake tutorial"}],
        steps:["Start with Nova in a sit.","Have a tasty treat between finger and thumb.","Move the treat either side (or up and down) so Nova follows it and has to move her head.","Once she's gone side to side, say 'good' and reward.","Repeat so she understands she's being rewarded for head movements.","Add the verbal cue 'what do you say?', continue moving your hand, and reward. Slowly reduce the gesture."]},
      { id:9,  name:"Snoot",             emoji:"⭕", difficulty:"Easy",   time:"2 hours", prerequisite:"None",       description:"Nova places her nose/muzzle through a circle made by your hands.",
        videos:[{id:"EqhAIADDl6A",title:"Dogs Trust – Teach the Snoot Challenge"},{id:"8bvh_srUmVg",title:"Dogs Trust – Snoot Challenge Tutorial"}],
        steps:["Make a circle with your finger and thumb — this is where her nose will go.","Place a treat on your side of the hole so she pushes her nose through to reach it.","Build up the time she holds her nose in position before rewarding.","Add the verbal cue 'snoot' before presenting your circle.","If she immediately puts her nose there, say 'good' and reward.","If she hesitates, wait a few seconds. Build up the time she holds position before rewarding."]},
      { id:10, name:"Jump Over",         emoji:"🏅", difficulty:"Easy",   time:"2 hours", prerequisite:"Stay",       description:"Nova jumps over an obstacle. Suitable for dogs over 1 year of age.",
        videos:[{id:"3m-S2vRHG5o",title:"McCann Dogs – How To Teach A Dog To Jump"},{id:"0P35xUGioSs",title:"Teach Your Dog to Jump over a Bar"}],
        steps:["Have Nova in a sit/stay on one side of a very low jump, toy ready.","Stand on the other side, say 'over' and move backwards to encourage her to come.","When she gets over, have a really good play with her.","Repeat so she learns 'over' means go over the jump.","Stand to the side and practice — say 'over', reward with play as she lands.","Incorporate multiple jumps in a row without needing a sit/stay between each one."]},
      { id:11, name:"Roll Out Yoga Mat", emoji:"🧘", difficulty:"Easy",   time:"2 hours", prerequisite:"None",       description:"Nova rolls out your yoga mat to help you prepare!",
        videos:[{id:"Fj3f_iP6lJw",title:"Brain Games – Teach Your Dog to Clean Up / Unroll"}],
        steps:["Lay the mat flat then roll it up, hiding a treat in each roll.","Leave a small section at the end with treats sprinkled on it.","Let Nova explore the mat and eat the visible treats.","Help by unrolling a little bit initially if needed.","Use fewer treats in the mat over repetitions until it's a smooth roll-out.","Add the cue 'do you want to do some yoga?' before placing the mat down once she's confident."]},
      { id:12, name:"Crawl",             emoji:"🐛", difficulty:"Easy",   time:"2 hours", prerequisite:"Down",       description:"Nova commando crawls towards you.",
        videos:[{id:"THZVkTgvUmc",title:"Dog Tricks – Crawl Forward On Command"},{id:"SzgAUjhGnDs",title:"Teach Your Dog to Crawl: The Only Video You'll Need!"}],
        steps:["Ask Nova to lie down.","Hold a closed hand of treats close to her nose.","Draw your hand back really slowly, keeping it slightly lower than her nose.","As soon as she shuffles forwards at all, reward her.","Keep rewarding every little shuffle until she's confident with the movement.","Build up the distance, then add the verbal cue 'crawl'. Reduce luring over repetitions."]},
      { id:13, name:"Sit Pretty",        emoji:"🧸", difficulty:"Medium", time:"4 hours", prerequisite:"Sit",        description:"Nova sits on her haunches with paws up — adorable!",
        videos:[{id:"xZH5LJpV6Wo",title:"How to teach your dog to SIT PRETTY"},{id:"IQUerO0woqw",title:"Kikopup – Teach Sit Pretty"}],
        steps:["Ask Nova to sit.","Hold a closed hand of treats at her nose without letting her have any.","Slowly raise your hand — reward as soon as one or both paws lift.","Gradually extend the time she holds position before rewarding.","Over repetitions she'll build the core strength needed.","Add the cue 'pretty' or 'say please'. Build her strength gradually over sessions."]},
      { id:14, name:"Walk Backwards",    emoji:"⬅️", difficulty:"Medium", time:"3 hours", prerequisite:"None",       description:"Nova walks backwards away from you in a straight line.",
        videos:[{id:"tCJNt2maTto",title:"Dog Tricks – Walk Backwards On Command"},{id:"lqR57PTKUQY",title:"Robert Cabral – Teach Your Dog to Walk Backwards"}],
        steps:["Have Nova standing in front of you with a treat in a closed hand.","Place your hand on her nose and gently move it towards her so she steps back — say 'good'.","Build up how many steps backwards before each reward.","Say 'back' before moving your hand towards her.","On the 5th or 6th go, simply say 'back' and wait for her to move herself.","Make it more fluid by practicing more and expecting a few more steps each time."]},
      { id:15, name:"Roll Over",         emoji:"🔄", difficulty:"Easy",   time:"2 hours", prerequisite:"Down",       description:"Nova rolls all the way over!",
        videos:[{id:"-d-BTGv6LJc",title:"McCann Dogs – How To Teach Your Dog To Roll Over"},{id:"C1V3YMTgEF4",title:"Teach Your Dog To Roll Over"}],
        steps:["Ask Nova to lie down with one hip tucked under (a relaxed down).","Hold a closed hand of treats at her nose and move it slowly in a loop so she follows.","She should follow the treat all the way so her whole body rolls — use a tasty treat!","Reward once she's flopped back the right way up.","Add the verbal cue 'roll over' once the movement is reliable.","Note: suitable for physically fit dogs — older or arthritic dogs may find this too demanding."]},
      { id:16, name:"Ring a Bell",       emoji:"🔔", difficulty:"Easy",   time:"1 hour",  prerequisite:"None",       description:"Nova rings a bell when asked.",
        videos:[{id:"P4PuRji9sNY",title:"Ring a Bell Trick – Dog Training"},{id:"cWaB1e5BQyU",title:"Teach Your Dog How to Ring a Bell"}],
        steps:["Hide the bell behind your back, present it and wait for her to sniff — reward and remove.","Repeat until she's confident that interacting with the bell earns rewards.","Now wait for a paw tap — reward as soon as her foot moves towards or touches the bell.","Repeat a few times.","Once she's hitting it regularly, only reward when she makes the bell actually ring."]},
      { id:17, name:"Back Up Onto Object",emoji:"⬆️",difficulty:"Medium", time:"3 hours", prerequisite:"Walk Backwards",description:"Nova walks backwards and places her back paws onto a raised object.",
        videos:[{id:"A0SLEdI9_lc",title:"Teach Your Dog the Paws Up and Off Tricks"},{id:"tCJNt2maTto",title:"Walk Backwards – prerequisite foundation"}],
        steps:["Have your chosen object and a handful of treats.","Lure Nova onto the object so she initially has front paws on, then reward just back paws on it.","Repeat several times from different angles.","Step away and reverse her back onto the object with a hand lure — she'll learn to find it with her back paws.","Add the verbal cue 'get up' and repeat. Once fluid, just say the cue.","Once great on one object, try a different one."]},
      { id:18, name:"Chin on Floor",     emoji:"😢", difficulty:"Easy",   time:"1 hour",  prerequisite:"Down",       description:"Nova looks 'sad' with her chin resting between her paws on the floor.",
        videos:[{id:"ULMHAU3nG9E",title:"Teach Your Dog the 'Head Down' Trick"},{id:"Kd5NJW8Z5Ew",title:"Training Challenge – Head Down"}],
        steps:["Ask Nova to lie down, then hold a closed hand of treats on her nose.","Slowly lower your hand until her chin hits the floor — say 'good' and reward.","Repeat until fluid and she can hold it for a few seconds.","Add the cue 'chin' or 'sad' and lure the same way.","Reduce how much gesturing you're doing each time."]},
      { id:19, name:"Stand Up",          emoji:"🧍", difficulty:"Medium", time:"3 hours", prerequisite:"None",       description:"Nova stands up on her back legs like a human — very fun!",
        videos:[{id:"zHQv8tsfuh0",title:"McCann Dogs – Teach Your Dog To Walk On Hind Legs"},{id:"2PRQCX4Hf3M",title:"Teach Your Dog To Stand On TWO LEGS!"}],
        steps:["Have Nova standing and move treats from her nose upwards.","Reward any movement with her front legs off the floor.","Once reliably standing on back legs, increase the duration she maintains the position.","Now say your cue 'stand up'.","Lure the same way and reduce how much luring you do as she improves."]},
      { id:20, name:"Walk Across a Beam",emoji:"🤸", difficulty:"Easy",   time:"1 hour",  prerequisite:"Plank of wood",description:"Nova balances and walks across a beam.",
        videos:[{id:"_c5XOd4zMuI",title:"Teaching Your Dog Paws Up & body awareness (beam foundation)"}],
        steps:["Have the plank on the floor without wobbling. Place a treat every 10cm.","Lure all 4 paws onto the plank and let her find each treat.","Repeat with fewer treats each time.","Try the plank slightly raised — walk alongside Nova and reward her for crossing.","Once confident, set her up with just one treat at the end.","Add the cue 'walk on it' and practice with fewer treats, always rewarding at the end."]},
      { id:21, name:"Pivot Round Object",emoji:"🎡", difficulty:"Medium", time:"3 hours", prerequisite:"Paws Up",    description:"Nova puts her paws on an object and walks round it on her back legs.",
        videos:[{id:"MTqebkIPziU",title:"Paws Up – prerequisite foundation for pivot"},{id:"lbvBOA-KIRE",title:"Journey Dog Training – Paws Up & pivot intro"}],
        steps:["Lure Nova up onto the object as you did for Paws Up.","Once in position, do not reward immediately.","Move yourself slightly to the side — she'll reshuffle to face you. At that point say 'good' and reward.","Repeat, rewarding each movement, until you get a full circle.","Fade out how much you move — gesture or rock rather than taking full steps.","Over time she'll move more fluidly for fewer treats until she can circle without much help."]},
      { id:22, name:"Hold",              emoji:"👄", difficulty:"Medium", time:"3 hours", prerequisite:"Sit",        description:"Nova holds an object in her mouth.",
        videos:[{id:"dCVaqNPtIoQ",title:"Teach Your Dog To Hold A Toy"},{id:"cbfQ5qp-33M",title:"How To Teach Your Dog To HOLD Anything!!!"}],
        steps:["Choose an object that fits comfortably in Nova's mouth — a round toy works well.","Encourage her to take it in her mouth — say 'good' immediately and reward.","Don't allow her to play with it; you want a calm hold.","Build up how long she'll hold the toy. Start by aiming for just 1 second.","Present the toy — when she takes it, wait one second then say 'good' and reward.","Gradually build up the duration over sessions."]},
      { id:23, name:"Kiss",              emoji:"😘", difficulty:"Easy",   time:"2 hours", prerequisite:"Snoot",      description:"Nova holds her nose against your cheek.",
        videos:[{id:"EqhAIADDl6A",title:"Dogs Trust – Snoot Challenge (prerequisite for Kiss)"}],
        steps:["Teach Nova to nose-touch the tip of your first finger — reward when she touches it.","Build up to her holding her nose on your finger for around 5 seconds.","Move your finger closer and closer to your cheek, rewarding each 5-second touch.","Position your finger pointing at or touching your cheek.","Reward for touching and holding for 5 seconds — rebuild duration in this new position.","Add your cue 'can I have a kiss?' and place your finger on your cheek."]},
      { id:24, name:"Wave",              emoji:"👋", difficulty:"Medium", time:"3 hours", prerequisite:"Paw",        description:"Nova waves her paw at you.",
        videos:[{id:"TteXPPLvAGc",title:"How to teach your dog to wave bye"},{id:"8ajQpNAq7no",title:"Teach Your Dog To Wave – Trickmas Day 11"}],
        steps:["Hold your hand as for Paw and reward her for placing her foot there.","Raise your hand higher each time so she has to reach more.","When she tries to paw, remove your hand slightly — say 'good' as she attempts it and reward.","Repeat until she's waving several times — reward after a few waves.","Add the cue 'wave' and do the same.","Reduce hand gesturing until she waves on the verbal cue alone."]},
      { id:25, name:"Close the Door",    emoji:"🚪", difficulty:"Easy",   time:"2 hours", prerequisite:"None",       description:"Nova pulls a door shut.",
        videos:[{id:"4lL3Js-E1Bc",title:"How to teach your dog to CLOSE DOORS!"},{id:"60KTVMHGFZQ",title:"Push – Teach Your Dog to Close Doors & Drawers"}],
        steps:["Teach Nova to touch a post-it note with nose or paw and reward.","Stick the post-it on the door and reward her for touching or pawing at it.","Withhold rewards until she makes the door move — reward when it closes enough to make a noise.","Open the door further each time and repeat.","Add the cue 'close the door' with the post-it still in place.","Once she understands the cue, remove the post-it and just use the cue."]},
      { id:26, name:"Tell Me a Secret",  emoji:"🤫", difficulty:"Medium", time:"2 hours", prerequisite:"Kiss",       description:"Nova presses her nose against your ear as if whispering a secret.",
        videos:[{id:"EqhAIADDl6A",title:"Snoot & Kiss foundation (prerequisite for this trick)"}],
        steps:["Cup your hand as if listening to something.","Teach Nova to press her muzzle against your cupped palm.","Reward sniffing or any interaction at first, then build to 5 seconds.","Gradually move your hand closer to your ear, rewarding for holding position.","Cover your ear and reward Nova for holding her nose there for 5 seconds.","Add the verbal cue 'can you tell me a secret?'"]},
      { id:27, name:"Push Object",       emoji:"🚗", difficulty:"Easy",   time:"2 hours", prerequisite:"None",       description:"Nova pushes a toy car or object with her nose.",
        videos:[{id:"zC1VkZG9g3M",title:"Hand Touch / nose targeting – foundation for this trick"}],
        steps:["Present the object and wait for a sniff or interaction — say 'good', reward, remove.","Re-present and wait for a nose touch or shuffle — reward.","Over repetitions, increase how much contact you require before rewarding.","If the object moves, reward doubly.","Build up how far she moves the object."]},
      { id:28, name:"Fetch",             emoji:"🎾", difficulty:"Medium", time:"2 hours", prerequisite:"None",       description:"Nova brings back something you've thrown — a classic!",
        videos:[{id:"MGZwydOtPx0",title:"Training Positive – Teach Your Dog To FETCH Perfectly!"},{id:"62sjzalZX34",title:"Struggling with Retrieve? Watch This!"}],
        steps:["Find a toy she's interested in holding or picking up.","Drop the toy — say 'good' as soon as she picks it up and raises her head.","Build up until she holds it in front of you for a second or two.","Put your hand on the toy before saying 'good' so she drops it into your hand.","Repeat until reliable.","Build up how far you throw the toy — over sessions, gradually increase the distance."]},
      { id:29, name:"Cross Legs",        emoji:"✨", difficulty:"Medium", time:"3 hours", prerequisite:"Down",       description:"Nova lies down elegantly with her paws crossed.",
        videos:[{id:"xv7naqQJnlw",title:"Train Your Dog to Cross Paws!"},{id:"pYMJ1ERLXSk",title:"Teaching dog tricks: cross paws"}],
        steps:["Practice a few Paws to warm up.","Ask her into a down and ask for Paw — reward her.","Practice this until she reliably gives paw while staying in the down.","Gently move her paw so it lands on top of the other — say 'good' and reward immediately.","Keep rewarding for as long as she keeps paws crossed — stop rewarding if she moves them.","Repeat lots, then encourage her to cross over herself. Add the cue 'cross'."]},
      { id:30, name:"Walk Round a Cone", emoji:"🦺", difficulty:"Easy",   time:"2 hours", prerequisite:"None",       description:"Nova walks round a cone or any object.",
        videos:[{id:"qPMTDaYAiKg",title:"Teach your dog to WEAVE / Walk Round Objects"}],
        steps:["Place the cone down and reward Nova for any movement towards it.","Throw the treat away to reset, then reward her on the far side of the cone.","Throw a treat away again to complete the full circle.","Repeat, then try not rewarding halfway round.","Once circling confidently, increase how far she walks to reach the cone.","Add the cue 'go around' before she sets off."]},
      { id:31, name:"Jump Onto Back",    emoji:"🐎", difficulty:"Hard",   time:"4 hours", prerequisite:"Balance",    description:"Nova jumps onto your back!",
        videos:[{id:"OQRLWZfAa74",title:"McCann Dogs – Teach Your Dog To Jump (foundation)"}],
        steps:["Get on all fours to stabilise yourself — have treats in hand.","Encourage Nova to place all four legs onto your back, guiding with your hand position.","Reward half-attempts first, then a full jump.","Build up your core strength and practice with you gradually more upright each time."]},
      { id:32, name:"Leg Weaves",        emoji:"🎪", difficulty:"Easy",   time:"3 hours", prerequisite:"Figure of 8",description:"Nova walks through your legs as you walk.",
        videos:[{id:"NPlisMpiTL0",title:"McCann Dogs – Teach Your Dog To Weave Through Your Legs"},{id:"Rff_bljpC0g",title:"Battersea – Teach your dog to weave between your legs"}],
        steps:["Start with a treat in each hand and practice moving side to side.","Spread your legs as if stepping forward and lure Nova through.","Take a step with the other leg and repeat.","Make it fluid so she doesn't hesitate.","Reduce the lure — show the hand behind your leg but only reward at your side. Build up steps."]},
      { id:33, name:"Be Shy",            emoji:"🙈", difficulty:"Easy",   time:"3 hours", prerequisite:"Down",       description:"Nova puts her paw on her nose — adorable!",
        videos:[{id:"YoJZsaWA3sA",title:"How to teach your dog: COVER YOUR EYES / BE SHY"},{id:"AmKxhuWLNog",title:"How to teach your dog to be shy"}],
        steps:["Roll a small piece of sticky tape (both sides sticky) and place on her nose.","Say 'good' and reward as soon as she tries to remove it — take the tape off after each reward.","Reward any paw movement towards her nose extra generously.","Add the cue 'are you shy?' and continue rewarding paw-to-nose movements.","Once consistent, pretend to place tape (hand gesture only) and say the cue — reward attempts.","Finally, reduce the hand gesture and just use the verbal cue."]},
      { id:34, name:"Orbit",             emoji:"🌍", difficulty:"Hard",   time:"4 hours", prerequisite:"Walk Backwards",description:"Nova walks round you backwards — impressive!",
        videos:[{id:"InvGz8uLpx0",title:"Trick Training – Teaching the Orbit"},{id:"fiqLEMH_8zk",title:"How to Teach Your Dog to ORBIT"}],
        steps:["Have treats in both hands and Nova in a heel position.","Move one hand gently into her (as for Walk Backwards) but direct it behind your back.","Reward when you can't reach further, then meet with your other hand and continue.","Reward again once she's back in front of you.","Guide her around until she's back in the original heel position.","Reduce interval rewards to one at the end. Add 'orbit' and reduce gestures."]},
      { id:35, name:"Jump Into Arms",    emoji:"🤗", difficulty:"Hard",   time:"4 hours", prerequisite:"None",       description:"Nova jumps into your arms for a cuddle!",
        videos:[{id:"dkf2WZn1tY4",title:"McCann – Teach Your Dog To Jump Up Into Your Arms"},{id:"1LCaivl0bmU",title:"Easy Trick! Teach Your Dog to Jump Into Your Arms"}],
        steps:["Start sitting cross-legged on the floor with Nova to your side.","Lure her onto your lap so all four paws are across your legs.","Repeat until she's confident standing on you.","Add the cue 'up up' once she's reliably getting on.","Use a chair to raise yourself slightly and repeat with 'up up'.","Remove the chair, crouch with one knee up, and gradually stand more upright each time."]},
      { id:36, name:"Wrap Up",           emoji:"🌯", difficulty:"Hard",   time:"4 hours", prerequisite:"Down",       description:"Nova rolls herself up in her blanket.",
        videos:[{id:"-d-BTGv6LJc",title:"McCann Dogs – Roll Over (core component)"},{id:"dCVaqNPtIoQ",title:"Teach Your Dog To Hold A Toy (core component)"}],
        steps:["Practice having Nova hold the blanket in her mouth.","Reward for picking it up off the floor and holding it.","Practice Roll Over while she's lying on the laid-out blanket.","Combine: lay her on the blanket, bunch some up between her paws for her to hold.","Once holding, ask her to roll over — reward only if she holds AND rolls.","Practice until fluid, then add the cue 'wrap up'."]},
      { id:37, name:"Speak",             emoji:"📢", difficulty:"Medium", time:"2 hours", prerequisite:"None",       description:"Nova barks on cue — and only on cue!",
        videos:[{id:"w0TASn4OhZc",title:"Zak George – How to Teach your Dog to Speak"},{id:"5SadtOFNzP0",title:"How to Teach Your Dog to SPEAK in 1 MINUTE"}],
        steps:["When Nova barks predictably, say 'good' and reward the bark.","If she barks again, repeat.","Now before she barks, say 'speak' — if she barks, reward.","Ask for other behaviours in between, then 'speak' to make the cue deliberate.","This must be taught well so Nova only barks when asked.","If she barks without you asking after the cue is established, do not reward her."]},
      { id:38, name:"Jump Through Arms", emoji:"🎠", difficulty:"Easy",   time:"3 hours", prerequisite:"Sit",        description:"Nova jumps through a hoop made by your arms — circus dog!",
        videos:[{id:"lJzica-iTqM",title:"AKC – Teach Your Dog How To Jump Through Arms"},{id:"EXm7uK9Jw9E",title:"How to teach your dog to jump through your arms"}],
        steps:["Work in a doorway with Nova on one side and a treat on the other.","Ask Nova to sit and wait so she doesn't steal the treat.","Place one arm 5–10cm across the door frame — release her with 'through'.","Tap the floor with your other hand if she needs encouragement.","Once reliable, create a hoop with both arms and repeat.","Practice without a treat on the other side — reward from your treat pouch. Gradually raise the height."]},
      { id:39, name:"Do the Laundry",    emoji:"🧺", difficulty:"Medium", time:"4 hours", prerequisite:"Drop",       description:"Nova moves laundry from the basket into the washing machine!",

                      <div key={t.id} className={`card${isl?" learned":""}${isip?" ip":""}`} onClick={()=>openModal(t.id)}>
                        {(isl||isip) && <div className="sbadge">{isl?"⭐":"🔥"}</div>}
                        <span className="ce">{t.emoji}</span>
                        <div className="cn">{t.name}</div>
                        <span className="cbadge" style={{background:dc.bg,color:dc.text}}>{t.difficulty}</span>
                        <div className="cm">⏱ {t.time}</div>
                        {t.prerequisite!=="None" && <div className="cm">📌 {t.prerequisite}</div>}
                        <div className="cm">▶ {t.videos.length} video{t.videos.length!==1?"s":""}</div>
                        <div className="cacts" onClick={e=>e.stopPropagation()}>
                          <button className={`ab ab-p${isip?" on":""}`} onClick={()=>toggleInProgress(t.id)}>
                            {isip?"🔥 On it!":"🔥 Start"}
                          </button>
                          <button className={`ab ab-l${isl?" on":""}`} onClick={()=>toggleLearned(t.id)}>
                            {isl?"⭐ Done!":"⭐ Done"}
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
            }

            {trick && (
              <div className="ov" onClick={closeModal}>
                <div className="modal" onClick={e=>e.stopPropagation()}>
                  <div className="mhandle"/>

                  <div className="mhdr">
                    <div className="memi">{trick.emoji}</div>
                    <div>
                      <div className="mtitle">{trick.name}</div>
                      <div className="mdesc">{sub(trick.description)}</div>
                    </div>
                  </div>

                  <div className="mtags">
                    <span className="mtag" style={{background:DC[trick.difficulty].bg,color:DC[trick.difficulty].text}}>
                      {trick.difficulty}
                    </span>
                    <span className="mtag">⏱ {trick.time}</span>
                    {trick.prerequisite!=="None" && <span className="mtag">📌 {trick.prerequisite}</span>}
                    <span className="mtag">▶ {trick.videos.length} video{trick.videos.length!==1?"s":""}</span>
                  </div>

                  <div className="tabs">
                    <button className={`tabbtn${tab==="steps"?" active":""}`} onClick={()=>setTab("steps")}>📋 Steps</button>
                    <button className={`tabbtn${tab==="video"?" active":""}`} onClick={()=>setTab("video")}>▶️ Watch</button>
                  </div>

                  {tab==="steps" && <>
                    <div className="snav">
                      {trick.steps.map((_,i) => (
                        <div key={i} className={`sdot${i===activeStep?" active":i<activeStep?" done":""}`}
                          onClick={()=>setActiveStep(i)}>
                          {i<activeStep?"✓":i+1}
                        </div>
                      ))}
                    </div>
                    <div className="scontent">
                      <div className="snum">Step {activeStep+1} of {trick.steps.length}</div>
                      <div className="stxt">{sub(trick.steps[activeStep])}</div>
                    </div>
                    <div className="sbtns">
                      <button className="snbtn prev" disabled={activeStep===0}
                        onClick={()=>setActiveStep(s=>s-1)}>← Back</button>
                      <button className="snbtn next" disabled={activeStep===trick.steps.length-1}
                        onClick={()=>setActiveStep(s=>s+1)}>Next →</button>
                    </div>
                  </>}

                  {tab==="video" && (
                    <div className="vtab">
                      {trick.videos.length===0
                        ? <div className="novid"><span className="nve">🎬</span><p>No video yet!</p></div>
                        : <div className="vcards">
                            {trick.videos.map((v,i) => (
                              <a key={i} className="vcard"
                                href={`https://www.youtube.com/watch?v=${v.id}`}
                                target="_blank" rel="noopener noreferrer">
                                <div className="vthumb">
                                  <img src={`https://img.youtube.com/vi/${v.id}/mqdefault.jpg`} alt={v.title}
                                    onError={e=>e.target.src=`https://img.youtube.com/vi/${v.id}/hqdefault.jpg`}/>
                                  <div className="vplay">
                                    <div className="vplay-circle"><div className="vplay-tri"/></div>
                                  </div>
                                </div>
                                <div className="vinfo">
                                  <div className="vnum">Video {i+1}</div>
                                  <div className="vtitle">{v.title}</div>
                                  <div className="vylink">▶ Watch on YouTube</div>
                                </div>
                              </a>
                            ))}
                          </div>
                      }
                    </div>
                  )}

                  <div className="macts">
                    <button className="mact"
                      style={inProgress.has(trick.id)
                        ? {background:"#ffb300",color:"#fff"}
                        : {background:"#fff8e1",color:"#f57f17",border:"2px solid #ffe082"}}
                      onClick={()=>toggleInProgress(trick.id)}>
                      {inProgress.has(trick.id)?"🔥 Learning this!":"🔥 Mark as Learning"}
                    </button>
                    <button className="mact"
                      style={learned.has(trick.id)
                        ? {background:"#43a047",color:"#fff"}
                        : {background:"#e8f5e9",color:"#2e7d32",border:"2px solid #a5d6a7"}}
                      onClick={()=>toggleLearned(trick.id)}>
                      {learned.has(trick.id)?`⭐ ${dogName} got it!`:`⭐ ${dogName} nailed it!`}
                    </button>
                  </div>
                  <button className="mcls" onClick={closeModal}>Close</button>
                </div>
              </div>
            )}
            </>)}
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
